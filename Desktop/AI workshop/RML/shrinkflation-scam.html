<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>The Shrinkflation Scam — Volume Con · RML</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --ink:#1A1A1A; --bg:#fff;
  --yellow:#F5C842; --mint:#2EB39E; --mint-bg:#E6F7F4;
  --peach:#FF6B6B; --peach-bg:#FFF0F0;
  --sky:#4DAAFF; --orange:#F99B4E;
  --text:#1A1A1A; --text-2:#555; --text-3:#999;
  --shadow:3px 3px 0 var(--ink); --shadow-sm:2px 2px 0 var(--ink);
  --fd:'Sora',sans-serif; --fb:'Inter',sans-serif;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html{-webkit-text-size-adjust:100%;}
body{font-family:var(--fb);background:#fff;color:var(--text);min-height:100dvh;
  background-image:linear-gradient(rgba(0,0,0,0.03) 1px,transparent 1px),linear-gradient(90deg,rgba(0,0,0,0.03) 1px,transparent 1px);
  background-size:32px 32px;}

/* HEADER */
#hdr{position:sticky;top:0;z-index:100;background:#fff;border-bottom:2px solid var(--ink);
  padding:12px 20px;display:flex;align-items:center;justify-content:space-between;background-image:none;}
.hdr-brand{font-family:var(--fd);font-weight:800;font-size:15px;display:flex;align-items:center;gap:8px;}
.hdr-pill{background:var(--ink);color:#fff;font-family:var(--fd);font-size:11px;font-weight:700;
  letter-spacing:1.5px;text-transform:uppercase;padding:3px 10px;}
#step-ind{font-family:var(--fd);font-size:12px;font-weight:700;color:var(--text-3);letter-spacing:1px;}

/* LAYOUT */
.main{max-width:600px;margin:0 auto;padding:28px 20px 80px;}
.step-label{font-family:var(--fd);font-size:11px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--text-3);margin-bottom:8px;}
.step-title{font-family:var(--fd);font-size:clamp(22px,5.5vw,28px);font-weight:800;color:var(--text);margin-bottom:20px;line-height:1.2;}
.q-prompt{font-family:var(--fd);font-size:clamp(17px,4.5vw,20px);font-weight:700;margin-bottom:16px;line-height:1.3;padding-left:14px;border-left:4px solid var(--yellow);}

/* CHIPS */
.chip{padding:14px 18px;font-family:var(--fd);font-size:15px;font-weight:700;
  border:2px solid var(--ink);background:#fff;box-shadow:var(--shadow-sm);cursor:pointer;
  text-align:left;user-select:none;-webkit-tap-highlight-color:transparent;width:100%;
  display:block;margin-bottom:10px;transition:transform .08s,box-shadow .08s;}
.chip:last-child{margin-bottom:0;}
.chip:active{transform:translate(2px,2px);box-shadow:none;}
.chip.selected{background:var(--yellow);}
.chip.correct{background:var(--mint);color:#fff;border-color:var(--mint);}
.chip.wrong{background:var(--peach-bg);border-color:var(--peach);animation:shake .35s;}
.chips{display:flex;flex-direction:column;gap:0;margin:16px 0;}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-6px)}75%{transform:translateX(6px)}}

/* FEEDBACK */
.feedback{font-family:var(--fd);font-size:14px;font-weight:700;padding:12px 16px;margin-top:12px;
  border:2px solid var(--mint);background:var(--mint-bg);color:var(--mint);display:none;line-height:1.5;}
.feedback.wrong-fb{border-color:var(--peach);background:var(--peach-bg);color:var(--peach);}
.feedback.show{display:block;}

/* BUTTON */
.btn{display:block;width:100%;padding:16px;font-family:var(--fd);font-size:16px;font-weight:800;
  background:var(--yellow);border:2px solid var(--ink);box-shadow:var(--shadow);cursor:pointer;
  margin-top:20px;-webkit-tap-highlight-color:transparent;transition:transform .08s,box-shadow .08s;
  text-align:center;}
.btn:active{transform:translate(3px,3px);box-shadow:none;}
.btn:disabled{background:#E8E8E8;color:var(--text-3);cursor:not-allowed;box-shadow:var(--shadow-sm);}

/* VIS AREA */
.vis-area{border:2px solid var(--ink);box-shadow:var(--shadow);background:#F8F8F6;
  margin-bottom:14px;overflow:hidden;padding:20px;text-align:center;}

/* CALLOUT */
.callout{border:2px solid var(--ink);box-shadow:var(--shadow-sm);padding:16px 18px;margin:14px 0;
  background:#fff;font-family:var(--fd);font-size:15px;font-weight:700;line-height:1.6;}
.callout strong{font-weight:800;}

/* SLIDER */
.slider-block{border:2px solid var(--ink);padding:16px 18px;margin-bottom:12px;background:#fff;box-shadow:var(--shadow-sm);}
.slider-block-label{font-family:var(--fd);font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--text-3);margin-bottom:10px;}
.slider-row{display:flex;align-items:center;gap:12px;}
.slider-label{font-family:var(--fd);font-size:14px;font-weight:800;white-space:nowrap;min-width:48px;}
input[type="range"]{flex:1;accent-color:var(--yellow);cursor:pointer;}

/* VOL PILLS */
.vol-display{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-top:14px;}
.vol-pill{background:#fff;border:2px solid var(--ink);padding:14px;text-align:center;box-shadow:var(--shadow-sm);}
.vol-pill .vp-label{font-family:var(--fd);font-size:11px;color:var(--text-3);font-weight:700;text-transform:uppercase;letter-spacing:1px;margin-bottom:6px;}
.vol-pill .vp-val{font-family:var(--fd);font-size:22px;font-weight:800;color:var(--text);}
.vol-pill .vp-sub{font-size:11px;color:var(--text-2);margin-top:3px;font-weight:600;}
.vol-pill.highlight{background:#F5F5F5;}
.vol-pill.loss .vp-val{color:var(--peach);}
@keyframes flash-red{0%,100%{background:#fff}50%{background:var(--peach-bg)}}

/* MEASURE */
.zone-row{display:flex;gap:10px;margin-top:16px;flex-wrap:wrap;}
.zone-btn{flex:1;min-width:80px;padding:12px 8px;border:2px solid var(--ink);background:#fff;
  font-family:var(--fd);font-size:13px;font-weight:700;cursor:pointer;text-align:center;
  box-shadow:var(--shadow-sm);-webkit-tap-highlight-color:transparent;
  transition:transform .08s,box-shadow .08s;}
.zone-btn:active:not(:disabled){transform:translate(2px,2px);box-shadow:none;}
.zone-btn.tapped{background:var(--mint);color:#fff;border-color:var(--mint);cursor:default;box-shadow:none;}
.measure-card{border:2px solid var(--ink);padding:12px 14px;margin-top:10px;display:none;background:#fff;box-shadow:var(--shadow-sm);}
.measure-card.show{display:block;animation:slideDown .25s ease;}
@keyframes slideDown{from{opacity:0;transform:translateY(-6px)}to{opacity:1;transform:translateY(0)}}
.measure-row{display:flex;justify-content:space-between;align-items:center;padding:5px 0;}
.measure-row+.measure-row{border-top:1px solid #eee;}
.measure-lbl{font-family:var(--fd);font-size:12px;font-weight:700;color:var(--text-3);text-transform:uppercase;letter-spacing:1px;}
.measure-val{font-family:var(--fd);font-size:15px;font-weight:800;}

/* NAV */
.nav-row{margin-top:20px;}

/* PRESS CARD */
.press-card{background:#fff;border:2px solid var(--ink);box-shadow:var(--shadow);padding:24px 28px;margin-bottom:20px;position:relative;}
.press-card::before{content:"PRESS RELEASE";position:absolute;top:14px;right:18px;font-family:var(--fd);font-size:9px;letter-spacing:2px;color:var(--text-3);font-weight:700;}
.press-logo{font-family:var(--fd);font-size:20px;font-weight:800;color:var(--ink);margin-bottom:6px;}
.press-divider{height:2px;background:var(--ink);margin:10px 0 14px;}
.press-headline{font-family:var(--fd);font-size:18px;font-weight:800;color:var(--text);margin-bottom:8px;line-height:1.3;}
.press-sub{font-family:var(--fb);font-size:13px;font-weight:500;color:var(--text-2);line-height:1.6;}

/* SIMULATION */
.sim-row{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:16px;}
.sim-col{border:2px solid var(--ink);padding:14px;text-align:center;box-shadow:var(--shadow-sm);}
.sim-col-title{font-family:var(--fd);font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--text-3);margin-bottom:8px;}
.sim-loss{font-family:var(--fd);font-size:22px;font-weight:800;margin-top:6px;}

/* SCENARIOS */
.scenario-card{border:2px solid var(--ink);padding:20px;margin-bottom:14px;box-shadow:var(--shadow-sm);}
.sc-label{font-family:var(--fd);font-size:10px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--text-3);margin-bottom:6px;}
.sc-q{font-family:var(--fd);font-size:16px;font-weight:800;color:var(--text);margin-bottom:14px;line-height:1.35;}
.sc-score{text-align:right;font-family:var(--fd);font-size:13px;font-weight:700;color:var(--text-3);margin-bottom:12px;}

/* EST PILL */
.est-pill{display:inline-flex;align-items:center;gap:8px;border:2px solid var(--ink);padding:8px 16px;margin-bottom:16px;font-family:var(--fd);font-size:14px;font-weight:700;background:var(--yellow);box-shadow:var(--shadow-sm);}
.est-pill .lbl{font-size:10px;letter-spacing:1px;text-transform:uppercase;font-weight:700;}

/* MASCOT */
.mascot-row{display:flex;gap:14px;align-items:flex-start;margin-bottom:20px;}
.mascot{flex-shrink:0;width:62px;height:62px;}
.bubble{flex:1;border:2px solid var(--ink);box-shadow:var(--shadow-sm);padding:13px 17px;font-family:var(--fb);font-size:14px;font-weight:500;line-height:1.55;position:relative;background:#fff;}
.bubble::before{content:"";position:absolute;left:-10px;top:16px;border:10px solid transparent;border-right-color:var(--ink);border-left:0;}
.bubble::after{content:"";position:absolute;left:-7px;top:18px;border:8px solid transparent;border-right-color:#fff;border-left:0;}
.bubble .name{font-family:var(--fd);font-size:10px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--text-3);margin-bottom:4px;}
</style>
</head>
<body>

<svg width="0" height="0" style="position:absolute">
  <defs>
    <g id="pip">
      <ellipse cx="50" cy="28" rx="26" ry="9" fill="#F99B4E"/>
      <rect x="24" y="28" width="52" height="38" fill="#F99B4E"/>
      <ellipse cx="50" cy="66" rx="26" ry="9" fill="#e8893a"/>
      <circle cx="41" cy="46" r="6" fill="white"/>
      <circle cx="59" cy="46" r="6" fill="white"/>
      <circle cx="42" cy="47" r="3.5" fill="#2B2320"/>
      <circle cx="60" cy="47" r="3.5" fill="#2B2320"/>
      <circle cx="43" cy="46" r="1.2" fill="white"/>
      <circle cx="61" cy="46" r="1.2" fill="white"/>
      <path d="M 43 57 Q 50 63 57 57" stroke="#2B2320" stroke-width="2.5" fill="none" stroke-linecap="round"/>
      <rect x="28" y="10" width="44" height="20" rx="5" fill="#2B3861"/>
      <rect x="18" y="26" width="64" height="6" rx="3" fill="#2B3861"/>
      <circle cx="76" cy="70" r="10" fill="none" stroke="#2EB39E" stroke-width="3"/>
      <line x1="83" y1="77" x2="90" y2="84" stroke="#2EB39E" stroke-width="3" stroke-linecap="round"/>
    </g>
  </defs>
</svg>

<header id="hdr">
  <div class="hdr-brand"><span>🥤</span><span>Volume Con</span><div class="hdr-pill">RML</div></div>
  <div id="step-ind">1 / 10</div>
</header>

<main class="main">
  <div id="frame-content"></div>
</main>

<script>
const SECTIONS = [
  {title:"The Hook"},
  {title:"The Two Cans"},
  {title:"Measure It"},
  {title:"What Changed?"},
  {title:"Your Theory"},
  {title:"Your Estimate"},
  {title:"See It Live"},
  {title:"Why Radius?"},
  {title:"The Simulation"},
  {title:"Lock It In"},
  {title:"Close"},
];

let current = 0;
let completed = new Set();
let estimate = null;
let measuresTapped = new Set();
let scenarioIdx = 0;
let scenarioScore = 0;
let ahaShown = false;
let simReveal = false;

// ── helpers ──────────────────────────────────────────
function pip(text) {
  return `<div class="mascot-row">
    <div class="mascot"><svg viewBox="0 0 100 100"><use href="#pip"/></svg></div>
    <div class="bubble"><div class="name">Pip · Volume Detective</div>${text}</div>
  </div>`;
}

function mcqOpt(id, letter, text, correct) {
  return `<button class="chip" id="opt-${id}-${letter}" data-correct="${correct}"
    onclick="handleMCQ('${id}','${letter}',${correct})">${text}</button>`;
}

function handleMCQ(id, letter, correct) {
  document.querySelectorAll(`[id^="opt-${id}-"]`).forEach(o => o.disabled = true);
  const el = document.getElementById(`opt-${id}-${letter}`);
  if (correct) {
    el.classList.add('correct');
    document.getElementById(`fb-${id}`)?.classList.add('show');
  } else {
    el.classList.add('wrong');
    document.querySelectorAll(`[id^="opt-${id}-"]`).forEach(o => {
      if (o.dataset.correct === 'true') o.classList.add('correct');
    });
    document.getElementById(`fb-${id}-wrong`)?.classList.add('show');
  }
  const btn = document.getElementById(`btn-${id}`);
  if (btn) btn.disabled = false;
}

// ── cylinder drawing ──────────────────────────────────
function cyl(cx, topY, rx, h, fill, stroke, label, labelColor) {
  const ry = Math.max(4, Math.round(rx*0.28));
  const by = topY+h;
  let g = `<g>`;
  g += `<rect x="${cx-rx}" y="${topY+ry}" width="${rx*2}" height="${h-ry}" fill="${fill}" stroke="${stroke}" stroke-width="1.5"/>`;
  g += `<ellipse cx="${cx}" cy="${by}" rx="${rx}" ry="${ry}" fill="${stroke}"/>`;
  g += `<ellipse cx="${cx}" cy="${topY+ry}" rx="${rx}" ry="${ry}" fill="${fill}" stroke="${stroke}" stroke-width="1.5"/>`;
  if (label) {
    const mid = topY+ry+(h-ry)*0.48;
    g += `<text x="${cx}" y="${mid+5}" text-anchor="middle" font-family="Sora" font-size="${Math.max(10,Math.round(rx*0.22))}" font-weight="700" fill="${labelColor||'#1A1A1A'}">${label}</text>`;
  }
  return g+`</g>`;
}

function cylGhost(cx, topY, rx, h) {
  const ry = Math.max(4, Math.round(rx*0.28));
  const by = topY+h;
  return `<g opacity="0.35">
    <rect x="${cx-rx}" y="${topY+ry}" width="${rx*2}" height="${h-ry}" fill="none" stroke="#999" stroke-width="1.5" stroke-dasharray="5,4"/>
    <ellipse cx="${cx}" cy="${topY+ry}" rx="${rx}" ry="${ry}" fill="none" stroke="#999" stroke-width="1.5" stroke-dasharray="5,4"/>
    <ellipse cx="${cx}" cy="${by}" rx="${rx}" ry="${ry}" fill="none" stroke="#999" stroke-width="1" stroke-dasharray="5,4"/>
  </g>`;
}

function dimArrowH(x1, x2, y, label, color) {
  color = color||'#555';
  const mid=(x1+x2)/2;
  return `<g>
    <line x1="${x1}" y1="${y}" x2="${x2}" y2="${y}" stroke="${color}" stroke-width="1.5"/>
    <polygon points="${x1},${y} ${x1+8},${y-4} ${x1+8},${y+4}" fill="${color}"/>
    <polygon points="${x2},${y} ${x2-8},${y-4} ${x2-8},${y+4}" fill="${color}"/>
    <text x="${mid}" y="${y-7}" text-anchor="middle" font-family="Sora" font-size="12" font-weight="700" fill="${color}">${label}</text>
  </g>`;
}

function dimArrowV(x, y1, y2, label, color) {
  color = color||'#555';
  const mid=(y1+y2)/2;
  return `<g>
    <line x1="${x}" y1="${y1}" x2="${x}" y2="${y2}" stroke="${color}" stroke-width="1.5"/>
    <polygon points="${x},${y1} ${x-4},${y1+8} ${x+4},${y1+8}" fill="${color}"/>
    <polygon points="${x},${y2} ${x-4},${y2-8} ${x+4},${y2-8}" fill="${color}"/>
    <text x="${x+8}" y="${mid+5}" font-family="Sora" font-size="12" font-weight="700" fill="${color}">${label}</text>
  </g>`;
}

function next() {
  completed.add(current);
  current = Math.min(current+1, SECTIONS.length-1);
  render();
  window.scrollTo({top:0,behavior:'smooth'});
}

// ── render ────────────────────────────────────────────
const RENDERS = [s0,s1,s2,sWC,s3,s4,s5,s6,s8,s9,s11];
function render() {
  document.getElementById('frame-content').innerHTML = RENDERS[current]();
  document.getElementById('step-ind').textContent = `${current+1} / ${SECTIONS.length}`;
  if (current===6) { ahaShown=false; drawSliderCyl(0); }
  if (current===8) { simReveal=false; drawSim(0); }
}

// ══════════════════════════════════════════════════════
// S0 — THE HOOK
// ══════════════════════════════════════════════════════
function s0() {
  const canSvg = `<svg viewBox="0 0 100 160" width="72" height="115" style="flex-shrink:0">
    ${cyl(50,6,38,138,'#E6F7F4','#2EB39E','','')}
    <rect x="14" y="52" width="72" height="44" fill="white" opacity="0.18" rx="2"/>
    <text x="50" y="72" text-anchor="middle" font-family="Sora" font-size="11" font-weight="700" fill="white">FrizzCo</text>
    <text x="50" y="86" text-anchor="middle" font-family="Sora" font-size="9" font-weight="600" fill="rgba(255,255,255,0.85)">NEW LOOK</text>
  </svg>`;
  return `<div class="step-label">The Shrinkflation Scam</div>
  <div class="step-title">Something doesn't add up.</div>
  <div class="press-card">
    <div style="display:flex;gap:20px;align-items:flex-start">
      <div style="flex:1">
        <div class="press-logo">FrizzCo</div>
        <div class="press-divider"></div>
        <div class="press-headline">New Look. Same Price.</div>
        <div class="press-sub">FrizzCo refreshed their can. Price didn't change. Did anything else?</div>
      </div>
      ${canSvg}
    </div>
  </div>
  <div class="nav-row"><button class="btn" onclick="next()">Find out →</button></div>`;
}

// ══════════════════════════════════════════════════════
// S1 — THE TWO CANS
// ══════════════════════════════════════════════════════
function s1() {
  return `<div class="step-label">The Evidence</div>
  <div class="step-title">Here are the old and new cans of FrizzCo.</div>
  <div class="vis-area">
    <svg viewBox="0 0 460 215" style="width:100%;max-width:440px;height:auto;display:block;margin:0 auto">
      ${cyl(130, 20, 62, 160, '#F5F5F5','#999','','#555')}
      ${cyl(330, 30, 55, 145, '#E6F7F4','#2EB39E','','#1A6A5C')}
      <text x="130" y="205" text-anchor="middle" font-family="Sora" font-size="13" font-weight="700" fill="#555">Old Can</text>
      <text x="330" y="205" text-anchor="middle" font-family="Sora" font-size="13" font-weight="700" fill="#1A6A5C">New Can</text>
    </svg>
  </div>
  <div class="nav-row"><button class="btn" onclick="next()">Measure the cans →</button></div>`;
}

// ══════════════════════════════════════════════════════
// S2 — MEASURE IT
// ══════════════════════════════════════════════════════
function s2() {
  return `<div class="step-label">Investigate</div>
  <div class="step-title">Tap each part to measure.</div>
  <div class="vis-area" style="margin-bottom:8px">
    <svg viewBox="0 0 440 190" style="width:100%;max-width:420px;height:auto;display:block;margin:0 auto">
      ${cyl(120,18,56,148,'#F5F5F5','#999','','')}
      ${cyl(310,26,50,136,'#E6F7F4','#2EB39E','','')}
      <text x="120" y="182" text-anchor="middle" font-family="Sora" font-size="12" font-weight="700" fill="#555">Old</text>
      <text x="310" y="182" text-anchor="middle" font-family="Sora" font-size="12" font-weight="700" fill="#1A6A5C">New</text>
    </svg>
  </div>
  <div class="zone-row">
    <button class="zone-btn" id="zone-h" onclick="tapZone('h')">📏 Height</button>
    <button class="zone-btn" id="zone-r" onclick="tapZone('r')">↔ Radius</button>
    <button class="zone-btn" id="zone-q" onclick="tapZone('q')">💰 Price</button>
  </div>
  <div class="measure-card" id="mc-h">
    <div class="measure-row"><span class="measure-lbl">Old height</span><span class="measure-val">3.8 in</span></div>
    <div class="measure-row"><span class="measure-lbl">New height</span><span class="measure-val">3.8 in</span></div>
  </div>
  <div class="measure-card" id="mc-r">
    <div class="measure-row"><span class="measure-lbl">Old radius</span><span class="measure-val">1.3 in</span></div>
    <div class="measure-row"><span class="measure-lbl">New radius</span><span class="measure-val">1.2 in</span></div>
  </div>
  <div class="measure-card" id="mc-q">
    <div class="measure-row"><span class="measure-lbl">Old price</span><span class="measure-val">$1.50</span></div>
    <div class="measure-row"><span class="measure-lbl">New price</span><span class="measure-val">$1.50</span></div>
  </div>
  <div class="nav-row"><button class="btn" id="btn-measure" onclick="next()" disabled>Next →</button></div>`;
}

function tapZone(z) {
  measuresTapped.add(z);
  document.getElementById(`zone-${z}`).classList.add('tapped');
  document.getElementById(`zone-${z}`).disabled = true;
  document.getElementById(`mc-${z}`).classList.add('show');
  if (measuresTapped.size >= 3) document.getElementById('btn-measure').disabled = false;
}

// ══════════════════════════════════════════════════════
// SWC — WHAT CHANGED?
// ══════════════════════════════════════════════════════
function sWC() {
  return `<div class="step-label">Observe</div>
  <div class="q-prompt">Which dimension changed?</div>
  <div class="chips">
    ${mcqOpt('ch','A','Height',false)}
    ${mcqOpt('ch','B','Radius',true)}
    ${mcqOpt('ch','C','Price',false)}
  </div>
  <div class="feedback" id="fb-ch">Right. Radius shrank — height and price stayed the same.</div>
  <div class="feedback wrong-fb" id="fb-ch-wrong">Check the numbers. Two rows are identical — one isn't.</div>
  <div class="nav-row"><button class="btn" id="btn-ch" onclick="next()" disabled>Next →</button></div>`;
}

// ══════════════════════════════════════════════════════
// S3 — YOUR THEORY
// ══════════════════════════════════════════════════════
function s3() {
  return `<div class="step-label">Your Theory</div>
  <div class="q-prompt">What do you think FrizzCo actually did?</div>
  <div class="chips">
    ${mcqOpt('t','A','Raised the price and kept the can the same',false)}
    ${mcqOpt('t','B','Shrank the can and kept the price the same',true)}
    ${mcqOpt('t','C','Changed the recipe to use less liquid',false)}
  </div>
  <div class="feedback" id="fb-t">Same price. Smaller can. Now let's find out how much you're actually losing.</div>
  <div class="feedback wrong-fb" id="fb-t-wrong">Look at the radius number again. Price didn't change — but something else did.</div>
  <div class="nav-row"><button class="btn" id="btn-t" onclick="next()" disabled>Next →</button></div>`;
}

// ══════════════════════════════════════════════════════
// S4 — YOUR ESTIMATE
// ══════════════════════════════════════════════════════
function s4() {
  return `<div class="step-label">Your Estimate</div>
  <div class="q-prompt">The radius shrank 10%. How much did the volume shrink?</div>
  ${pip(`Radius: 1.3 in → 1.2 in. That's about 10% less. Take a guess.`)}
  <div class="chips">
    <button class="chip" id="est-A" onclick="pickEst('A','About 10%')">About 10% — same as the radius cut</button>
    <button class="chip" id="est-B" onclick="pickEst('B','About 14%')">About 14% — a bit more</button>
    <button class="chip" id="est-C" onclick="pickEst('C','About 19%')">About 19% — close to 20%</button>
    <button class="chip" id="est-D" onclick="pickEst('D','More than 25%')">More than 25% — much worse</button>
  </div>
  <div class="feedback" id="fb-est">Locked in. Let's check.</div>
  <div class="nav-row"><button class="btn" id="btn-est" onclick="next()" disabled>See what happens →</button></div>`;
}

function pickEst(l, text) {
  estimate = text;
  ['A','B','C','D'].forEach(x => {
    const el = document.getElementById(`est-${x}`);
    if (el) el.classList.remove('selected');
  });
  const el = document.getElementById(`est-${l}`);
  if (el) el.classList.add('selected');
  document.getElementById('fb-est').classList.add('show');
  document.getElementById('btn-est').disabled = false;
}

// ══════════════════════════════════════════════════════
// S5 — SEE IT LIVE
// ══════════════════════════════════════════════════════
function s5() {
  const estText = estimate || '?';
  return `<div class="step-label">See It Live</div>
  <div class="step-title">Drag to shrink the radius. Watch what happens.</div>
  <div class="est-pill"><span class="lbl">Your guess</span><span>${estText} volume loss</span></div>
  <div class="slider-block">
    <div class="slider-block-label">Shrink radius by</div>
    <div class="slider-row">
      <span class="slider-label" id="r-pct-lbl">0%</span>
      <input type="range" min="0" max="30" value="0" id="r-slider" oninput="onSlider()">
    </div>
  </div>
  <div class="vis-area">
    <svg id="cyl-svg" viewBox="0 0 340 210" style="width:100%;max-width:340px;height:auto;display:block;margin:0 auto"></svg>
  </div>
  <div class="vol-display">
    <div class="vol-pill">
      <div class="vp-label">Radius</div>
      <div class="vp-val" id="vp-r">original</div>
      <div class="vp-sub" id="vp-rsub">3.3 cm</div>
    </div>
    <div class="vol-pill highlight">
      <div class="vp-label">Volume left</div>
      <div class="vp-val" id="vp-vol">100%</div>
      <div class="vp-sub">of original</div>
    </div>
    <div class="vol-pill loss" id="pill-lost">
      <div class="vp-label">Volume lost</div>
      <div class="vp-val" id="vp-lost">0%</div>
      <div class="vp-sub" id="vp-lostsub">&nbsp;</div>
    </div>
  </div>
  <div id="aha-box" class="callout" style="display:none">
    You guessed <strong>${estText}</strong>. At 10% radius shrink — actual volume loss: <strong style="color:var(--peach)">~19%</strong>.
  </div>
  <div class="nav-row"><button class="btn" id="btn-s5" onclick="next()" disabled>Next →</button></div>`;
}

function drawSliderCyl(pct) {
  const svg = document.getElementById('cyl-svg');
  if (!svg) return;
  const origRx=58, origH=165, topY=16, lCx=80, rCx=255;
  const newRx = Math.round(origRx*(1-pct/100));
  const isHot = pct >= 10;
  svg.innerHTML =
    cyl(lCx,topY,origRx,origH,'#F5F5F5','#999','Old','#555') +
    cylGhost(rCx,topY,origRx,origH) +
    cyl(rCx,topY,newRx,origH,isHot?'#FFF0F0':'#E6F7F4',isHot?'#FF6B6B':'#2EB39E','New',isHot?'#CC3333':'#1A6A5C');
}

function onSlider() {
  const pct = parseInt(document.getElementById('r-slider').value);
  const rFactor = 1-pct/100;
  const volFactor = rFactor*rFactor;
  const volPct = (volFactor*100).toFixed(0);
  const lostPct = (100-volFactor*100).toFixed(0);
  const newR = (3.3*rFactor).toFixed(2);

  document.getElementById('r-pct-lbl').textContent = `${pct}%`;
  const rEl = document.getElementById('vp-r');
  rEl.textContent = pct>0?`−${pct}% smaller`:'original';
  rEl.style.color = pct>0?'var(--peach)':'var(--text)';
  document.getElementById('vp-rsub').textContent = `${newR} cm`;
  document.getElementById('vp-vol').textContent = `${volPct}%`;
  document.getElementById('vp-lost').textContent = `${lostPct}%`;

  if (pct >= 10) {
    document.getElementById('vp-lostsub').textContent = 'more than radius %!';
    const pill = document.getElementById('pill-lost');
    pill.style.animation = 'none';
    pill.offsetHeight;
    pill.style.animation = 'flash-red .6s';
    if (!ahaShown) {
      ahaShown = true;
      document.getElementById('aha-box').style.display = 'block';
      document.getElementById('btn-s5').disabled = false;
    }
  } else {
    document.getElementById('vp-lostsub').textContent = '\u00a0';
  }
  drawSliderCyl(pct);
}

// ══════════════════════════════════════════════════════
// S6 — WHY RADIUS?
// ══════════════════════════════════════════════════════
function s6() {
  const compVis = `<div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px">
    <div style="border:2px solid var(--peach);padding:14px 10px;text-align:center;box-shadow:var(--shadow-sm);background:var(--peach-bg)">
      <div style="font-family:var(--fd);font-size:10px;text-transform:uppercase;letter-spacing:1px;color:var(--peach);font-weight:700;margin-bottom:8px">−10% radius</div>
      <div style="font-family:var(--fd);font-size:28px;font-weight:800;color:var(--peach)">−19%</div>
      <div style="font-family:var(--fd);font-size:11px;font-weight:700;color:var(--peach);margin-top:4px">volume lost</div>
    </div>
    <div style="border:2px solid #4DAAFF;padding:14px 10px;text-align:center;box-shadow:var(--shadow-sm);background:#EEF6FF">
      <div style="font-family:var(--fd);font-size:10px;text-transform:uppercase;letter-spacing:1px;color:#4DAAFF;font-weight:700;margin-bottom:8px">−10% height</div>
      <div style="font-family:var(--fd);font-size:28px;font-weight:800;color:#4DAAFF">−10%</div>
      <div style="font-family:var(--fd);font-size:11px;font-weight:700;color:#4DAAFF;margin-top:4px">volume lost</div>
    </div>
  </div>`;
  return `<div class="step-label">Think About It</div>
  ${compVis}
  <div class="q-prompt">Why does radius hit harder than height?</div>
  <div class="chips">
    ${mcqOpt('why','A','Radius shrinks the base in every direction at once',true)}
    ${mcqOpt('why','B','π amplifies any radius change',false)}
    ${mcqOpt('why','C','Shrinking any dimension always loses more than the % cut',false)}
    ${mcqOpt('why','D','Radius is bigger so the same % removes more',false)}
  </div>
  <div class="feedback" id="fb-why">
    The base is a circle. Shrink the radius — it shrinks in every direction.<br><br>
    <div style="text-align:center;font-size:20px;font-weight:800;background:#F5F5F5;border:2px solid var(--ink);padding:12px;margin-top:8px">
      V = π · <span style="color:var(--peach)">r²</span> · h
    </div>
  </div>
  <div class="feedback wrong-fb" id="fb-why-wrong">Look at the numbers above. Same cut — very different loss.</div>
  <div class="nav-row"><button class="btn" id="btn-why" onclick="next()" disabled>See it →</button></div>`;
}

// ══════════════════════════════════════════════════════
// S8 — THE SIMULATION
// ══════════════════════════════════════════════════════
function s8() {
  return `<div class="step-label">Prove It</div>
  <div class="step-title">Move both by the same amount. See who wins.</div>
  <div class="sim-row">
    <div class="sim-col">
      <div class="sim-col-title">Shrink Radius</div>
      <svg id="sim-r" viewBox="0 0 120 150" style="width:90px;height:112px;display:block;margin:0 auto"></svg>
      <div style="font-family:var(--fd);font-size:12px;font-weight:700;color:var(--text-3);margin:4px 0 2px">−<span id="sim-rpct">0</span>% radius</div>
      <div class="sim-loss" id="sim-rloss" style="color:var(--peach)">−0% volume</div>
    </div>
    <div class="sim-col">
      <div class="sim-col-title">Shrink Height</div>
      <svg id="sim-h" viewBox="0 0 120 150" style="width:90px;height:112px;display:block;margin:0 auto"></svg>
      <div style="font-family:var(--fd);font-size:12px;font-weight:700;color:var(--text-3);margin:4px 0 2px">−<span id="sim-hpct">0</span>% height</div>
      <div class="sim-loss" id="sim-hloss" style="color:var(--sky)">−0% volume</div>
    </div>
  </div>
  <div class="slider-block">
    <div class="slider-block-label">Drag both together</div>
    <div class="slider-row">
      <span class="slider-label" id="sim-pct-lbl">0%</span>
      <input type="range" min="0" max="30" value="0" id="sim-slider" oninput="onSim()">
    </div>
  </div>
  <div id="sim-callout" class="callout" style="display:none">
    <strong>Same shrink. Different damage.</strong> Radius is squared — so it always loses more volume for the same % change.
  </div>
  <div class="nav-row"><button class="btn" id="btn-sim" onclick="next()" disabled>Next →</button></div>`;
}

function drawSim(pct) {
  const origRx=42, origH=118, topY=12, cx=60;
  const newRx = Math.round(origRx*(1-pct/100));
  const newH = Math.round(origH*(1-pct/100));
  const hTopY = topY+(origH-newH);
  const svgR = document.getElementById('sim-r');
  const svgH = document.getElementById('sim-h');
  if (svgR) svgR.innerHTML = cylGhost(cx,topY,origRx,origH)+cyl(cx,topY,newRx,origH,'#FFF0F0','#FF6B6B','','');
  if (svgH) svgH.innerHTML = cylGhost(cx,topY,origRx,origH)+cyl(cx,hTopY,origRx,newH,'#EEF6FF','#4DAAFF','','');
}

function onSim() {
  const pct = parseInt(document.getElementById('sim-slider').value);
  document.getElementById('sim-pct-lbl').textContent = `${pct}%`;
  document.getElementById('sim-rpct').textContent = pct;
  document.getElementById('sim-hpct').textContent = pct;
  const rLoss = (100*(1-(1-pct/100)**2)).toFixed(0);
  document.getElementById('sim-rloss').textContent = `−${rLoss}% volume`;
  document.getElementById('sim-hloss').textContent = `−${pct}% volume`;
  drawSim(pct);
  if (pct>=10 && !simReveal) {
    simReveal=true;
    document.getElementById('sim-callout').style.display='block';
    document.getElementById('btn-sim').disabled=false;
  }
}

// ══════════════════════════════════════════════════════
// S9 — LOCK IT IN (3 scenarios)
// ══════════════════════════════════════════════════════
const SCENARIOS = [
  {lbl:'Scenario 1', q:'Height shrinks by 10%. Volume shrinks by?', opts:['5%','10%','19%','36%'], correct:1, note:'Height is linear — 10% less height = 10% less volume.'},
  {lbl:'Scenario 2', q:'Radius shrinks by 10%. Volume shrinks by?', opts:['5%','10%','19%','36%'], correct:2, note:'Radius is squared: (0.9)² = 0.81, so 19% volume loss.'},
  {lbl:'Scenario 3', q:'Radius shrinks by 20%. Volume shrinks by?', opts:['10%','20%','36%','44%'], correct:2, note:'(0.8)² = 0.64 — a 20% radius shrink loses 36% of volume.'},
];

function s9() {
  scenarioIdx = 0;
  scenarioScore = 0;
  return sceneFrame();
}

function sceneFrame() {
  const sc = SCENARIOS[scenarioIdx];
  const isLast = scenarioIdx === SCENARIOS.length-1;
  return `<div class="step-label">Lock It In</div>
  <div class="step-title">Your turn. How much volume is lost?</div>
  <div class="sc-score">${scenarioIdx} / ${SCENARIOS.length} done</div>
  <div class="scenario-card">
    <div class="sc-label">${sc.lbl}</div>
    <div class="sc-q">${sc.q}</div>
    <div class="chips" id="sc-opts">
      ${sc.opts.map((o,i)=>`<button class="chip" id="sc-opt-${i}" onclick="pickScene(${i},${i===sc.correct})">${o}</button>`).join('')}
    </div>
    <div class="feedback" id="sc-fb">${sc.note}</div>
    <div class="feedback wrong-fb" id="sc-fb-wrong">Not quite. ${sc.note}</div>
  </div>
  <div class="nav-row">
    <button class="btn" id="btn-sc" onclick="advScene()" disabled>${isLast?'Finish →':'Next scenario →'}</button>
  </div>`;
}

function pickScene(i, correct) {
  document.querySelectorAll('[id^="sc-opt-"]').forEach(b => b.disabled=true);
  const el = document.getElementById(`sc-opt-${i}`);
  if (correct) {
    el.classList.add('correct');
    scenarioScore++;
    document.getElementById('sc-fb').classList.add('show');
  } else {
    el.classList.add('wrong');
    document.getElementById('sc-fb-wrong').classList.add('show');
    document.getElementById(`sc-opt-${SCENARIOS[scenarioIdx].correct}`).classList.add('correct');
  }
  document.getElementById('btn-sc').disabled = false;
}

function advScene() {
  scenarioIdx++;
  if (scenarioIdx >= SCENARIOS.length) { next(); return; }
  document.getElementById('frame-content').innerHTML = sceneFrame();
}

// ══════════════════════════════════════════════════════
// S11 — CLOSE
// ══════════════════════════════════════════════════════
function s11() {
  const estText = estimate || 'a small amount';
  return `<div class="step-label">Case Closed</div>
  <div class="step-title">Same price. 2 fl oz gone.</div>
  ${pip(`You guessed ${estText}. Actual: ~19%.<br>Always check the fl oz — not the label.<br><br>Next: a chocolate bar. Same trick, different shape.`)}
  <div class="vis-area">
    <svg viewBox="0 0 440 200" style="width:100%;max-width:420px;height:auto;display:block;margin:0 auto">
      ${cyl(120,18,60,155,'#F5F5F5','#999','','')}
      ${cyl(310,28,54,142,'#E6F7F4','#2EB39E','','')}
      <rect x="82" y="72" width="76" height="30" rx="2" fill="white" opacity="0.9"/>
      <text x="120" y="92" text-anchor="middle" font-family="Sora" font-size="13" font-weight="800" fill="#FF6B6B">12 fl oz</text>
      <rect x="272" y="72" width="76" height="30" rx="2" fill="white" opacity="0.9"/>
      <text x="310" y="92" text-anchor="middle" font-family="Sora" font-size="13" font-weight="800" fill="#FF6B6B">10 fl oz</text>
      <text x="120" y="190" text-anchor="middle" font-family="Sora" font-size="12" font-weight="700" fill="#555">Old Can</text>
      <text x="310" y="190" text-anchor="middle" font-family="Sora" font-size="12" font-weight="700" fill="#1A6A5C">New Can</text>
    </svg>
  </div>
  <div class="nav-row"><button class="btn" onclick="window.location.href='base-squeeze.html'">Next Challenge →</button></div>`;
}

// ── init ──────────────────────────────────────────────
render();
</script>
</body>
</html>
